issues:
  exclude-rules:
    - path: (.+)_test.go
      linters:
        - errcheck
        - contextcheck

linters:
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gofmt
    - loggercheck
    - unconvert
    - whitespace
