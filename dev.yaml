# TODO: Set up service account, etc.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eno-controller
  labels:
    app: eno-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eno-controller
  template:
    metadata:
      labels:
        app: eno-controller
    spec:
      containers:
      - name: controller
        image: ${CONTROLLER_IMAGE}
        env:
        - name: WRAPPER_IMAGE
          value: ${WRAPPER_IMAGE}
