---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: symphonies.eno.azure.io
spec:
  group: eno.azure.io
  names:
    kind: Symphony
    listKind: SymphonyList
    plural: symphonies
    singular: symphony
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Symphony is a set of variations on a composition.
          Useful for creating several compositions that use a common set of bindings but different synthesizers.

          This pattern is highly opinionated for use-cases in which a single "unit of management"
          includes multiple distinct components. For example: deploying many instances of an application that
          is comprised of several components (Wordpress, etc.).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              bindings:
                description: Bindings are inherited by all compositions managed by
                  this symphony.
                items:
                  description: |-
                    Bindings map a specific Kubernetes resource to a ref exposed by a synthesizer.
                    Compositions use bindings to populate inputs supported by their synthesizer.
                  properties:
                    key:
                      description: Key determines which ref this binding binds to.
                        Opaque.
                      type: string
                    resource:
                      description: A reference to a specific resource name and optionally
                        namespace.
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - key
                  - resource
                  type: object
                type: array
              synthesisEnv:
                description: |-
                  SynthesisEnv
                  Copied opaquely into the compositions managed by this symphony.
                items:
                  properties:
                    name:
                      maxLength: 100
                      type: string
                    value:
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 50
                type: array
              variations:
                description: |-
                  Each variation will result in the creation of a composition.
                  Synthesizer refs must be unique across variations.
                  Removing a variation will cause the composition to be deleted!
                items:
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      description: Used to populate the composition's medatada.annotations.
                      type: object
                    bindings:
                      description: |-
                        Variation-specific bindings get merged with Symphony bindings and take
                        precedence over them.
                      items:
                        description: |-
                          Bindings map a specific Kubernetes resource to a ref exposed by a synthesizer.
                          Compositions use bindings to populate inputs supported by their synthesizer.
                        properties:
                          key:
                            description: Key determines which ref this binding binds
                              to. Opaque.
                            type: string
                          resource:
                            description: A reference to a specific resource name and
                              optionally namespace.
                            properties:
                              name:
                                type: string
                              namespace:
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - key
                        - resource
                        type: object
                      type: array
                    dependsOn:
                      description: |-
                        Dependencies for the composition created from this variation
                        References use synthesizer name - the symphony controller resolves them
                        to actual composition name when creating/updating compositions
                        Max dependencies is 50
                      items:
                        properties:
                          synthesizer:
                            description: |-
                              Synthesizer name of the dependency variation (within the same symphony)
                              Resolved to the actual composition name by the symphony controller
                            type: string
                        type: object
                      maxItems: 50
                      type: array
                    labels:
                      additionalProperties:
                        type: string
                      description: Used to populate the composition's metadata.labels.
                      type: object
                    optional:
                      description: |-
                        Optional indicates that this variation should not block the symphony status
                        when it fails to synthesize, reconcile, or become ready.
                      type: boolean
                    synthesisEnv:
                      description: |-
                        SynthesisEnv
                        Copied opaquely into the compositions that's derived from this variation.
                        It gets merged with the Symhony environment and takes precedence over it.
                      items:
                        properties:
                          name:
                            maxLength: 100
                            type: string
                          value:
                            type: string
                        required:
                        - name
                        type: object
                      maxItems: 25
                      type: array
                    synthesizer:
                      description: Used to populate the composition's spec.synthesizer.
                      properties:
                        labelSelector:
                          description: |-
                            A label selector is a label query over a set of resources. The result of matchLabels and
                            matchExpressions are ANDed. An empty label selector matches all objects. A null
                            label selector matches no objects.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                        name:
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: at least one of name or labelSelector must be set
                        rule: has(self.name) || has(self.labelSelector)
                  type: object
                type: array
            type: object
          status:
            properties:
              conditions:
                description: "Conditions describes the aggregate state of the compositions
                  managed by this Symphony.\nKnown condition types:\n - SymphonyReady:
                  all non-optional child compositions have been applied and are ready\n\nWhen
                  the SymphonyReady condition is False, the condition's message enumerates
                  the\nblocking compositions and their blocking resources in the form:\n\n\tNotApplied:
                  CompA [Deployment/foo, Service/bar], CompB [ConfigMap/baz]\n\tNotReady:
                  CompA [Deployment/foo], CompC [StatefulSet/db]"
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              ready:
                format: date-time
                type: string
              reconciled:
                format: date-time
                type: string
              synthesized:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
